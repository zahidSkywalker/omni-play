<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d0d1a">
  <title>MythicMuse — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d0d1a;
      color: #e8e0d0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 2rem;
      color: #d4af37;
      margin-bottom: 0.5rem;
    }
    p {
      color: #a899b8;
      max-width: 300px;
      line-height: 1.6;
    }
    svg {
      margin-bottom: 2rem;
      opacity: 0.5;
    }
    button {
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: #d4af37;
      color: #0d0d1a;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.875rem;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <svg width="64" height="64" viewBox="0 0 100 100" fill="none">
    <circle cx="50" cy="50" r="40" stroke="#d4af37" stroke-width="2" fill="none" opacity="0.3"/>
    <path d="M35 50 Q50 35 65 50 Q50 65 35 50Z" fill="none" stroke="#d4af37" stroke-width="2" opacity="0.5"/>
    <line x1="50" y1="30" x2="50" y2="70" stroke="#d4af37" stroke-width="1" opacity="0.3"/>
    <line x1="30" y1="50" x2="70" y2="50" stroke="#d4af37" stroke-width="1" opacity="0.3"/>
  </svg>
  <h1>You're Offline</h1>
  <p>The mystical realm is currently unreachable. Check your connection and try again.</p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
